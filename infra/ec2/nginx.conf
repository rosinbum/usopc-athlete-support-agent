# Nginx reverse proxy for USOPC Athlete Support Agent on EC2.
# Copy to /etc/nginx/sites-available/athlete-agent and symlink to sites-enabled.
#
# Replace DOMAIN with your actual domain (e.g., athlete-agent.rosinbum.org).
# Replace SLACK_DOMAIN with your Slack subdomain (e.g., slack.athlete-agent.rosinbum.org).
#
# TLS option A: Let's Encrypt (certbot)
# TLS option B: CloudFront in front — skip the ssl blocks and listen on 80 only.

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name DOMAIN SLACK_DOMAIN;
    return 301 https://$host$request_uri;
}

# Next.js web app
server {
    listen 443 ssl http2;
    server_name DOMAIN;

    ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    # SSE streaming — disable buffering globally
    proxy_buffering off;
    proxy_cache off;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Chat API — extended timeout for streaming responses
    location /api/chat {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    # All other Next.js routes
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Slack bot
server {
    listen 443 ssl http2;
    server_name SLACK_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/SLACK_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SLACK_DOMAIN/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
