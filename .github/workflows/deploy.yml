name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy (e.g. v1.2.3)"
        required: true
      stage:
        description: "Target stage"
        type: choice
        options:
          - production
        default: production

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.stage || 'staging' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # Gate: verify CI passed on the tagged commit before deploying to staging
  ci-check:
    name: Verify CI passed
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check CI status on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit $COMMIT_SHA"

          # Wait up to 10 minutes for CI check runs to complete
          for i in $(seq 1 60); do
            # Get check runs excluding our own deploy checks
            # Exclude deploy checks and comprehensive evals (slow, non-blocking)
            CHECKS_JSON=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/check-runs" \
              --jq '[.check_runs[] | select(.name != "Verify CI passed" and .name != "Deploy to Staging" and .name != "Deploy to Production" and .name != "Tier 2 — Comprehensive Evals" and .name != "Check for agent changes")]')

            TOTAL=$(echo "$CHECKS_JSON" | jq 'length')
            COMPLETED=$(echo "$CHECKS_JSON" | jq '[.[] | select(.status == "completed")] | length')
            SUCCESSFUL=$(echo "$CHECKS_JSON" | jq '[.[] | select(.conclusion == "success" or .conclusion == "skipped")] | length')
            FAILED=$(echo "$CHECKS_JSON" | jq '[.[] | select(.conclusion == "failure" or .conclusion == "cancelled")] | length')

            echo "Check runs: $COMPLETED/$TOTAL completed ($SUCCESSFUL passed, $FAILED failed). Attempt $i/60"

            if [ "$TOTAL" -gt 0 ] && [ "$COMPLETED" -eq "$TOTAL" ]; then
              if [ "$FAILED" -gt 0 ]; then
                echo "CI checks failed. Aborting deployment."
                echo "$CHECKS_JSON" | jq -r '.[] | select(.conclusion == "failure" or .conclusion == "cancelled") | "  ✗ \(.name): \(.conclusion)"'
                exit 1
              fi
              echo "All CI checks passed."
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for CI checks. Aborting deployment."
          exit 1

  deploy-staging:
    name: Deploy to Staging
    needs: ci-check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run database migrations
        run: |
          DB_URL=$(npx sst secret list --stage staging 2>/dev/null | grep '^DatabaseUrl=' | cut -d= -f2-)
          echo "::add-mask::$DB_URL"
          DATABASE_URL="$DB_URL" ./node_modules/.bin/tsx scripts/run-migrations.ts

      # Phase 1: SST deploy (Lambda workers, crons, DynamoDB, SQS, S3, EC2 instance)
      - name: Deploy SST infrastructure
        id: sst
        run: |
          npx sst deploy --stage staging 2>&1 | tee deploy-output.txt
          EC2_IP=$(grep -oP 'ec2PublicIp:\s+\K\S+' deploy-output.txt || true)
          echo "ec2_ip=$EC2_IP" >> "$GITHUB_OUTPUT"

      # Wait for SSH — needed when SST replaces the EC2 instance (userData
      # changes force replacement; sshd starts after OS boot, not after Pulumi
      # marks the instance "running").
      - name: Wait for EC2 SSH to be ready
        run: |
          EC2_IP="${{ steps.sst.outputs.ec2_ip || secrets.EC2_HOST }}"
          echo "Waiting for SSH on $EC2_IP (up to 10 min)..."
          for i in $(seq 1 60); do
            if nc -z -w5 "$EC2_IP" 22 2>/dev/null; then
              echo "SSH is ready (attempt $i)"
              exit 0
            fi
            echo "  ...not ready yet ($((i * 10))s elapsed)"
            sleep 10
          done
          echo "Timed out waiting for EC2 SSH after 10 minutes"
          exit 1

      # Phase 2: Deploy web + Slack to EC2 via SSH
      - name: Deploy apps to EC2
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ steps.sst.outputs.ec2_ip || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            # On a fresh instance, block until cloud-init (userData) finishes.
            # This ensures pnpm, git, and swap are all installed before we proceed.
            sudo cloud-init status --wait 2>/dev/null || true
            export APP_DIR="/home/ec2-user/app"
            export REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            # Rewrite SSH git URLs to HTTPS so git fetch works without a deploy key
            git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
            # Ensure pnpm is available for ec2-user. Use hardcoded path —
            # $HOME may not be set in non-login SSH sessions.
            export PATH="/home/ec2-user/.local/bin:$PATH"
            if ! command -v pnpm &>/dev/null; then
              echo "pnpm not found — installing to /home/ec2-user/.local"
              sudo rm -rf /usr/lib/nodejs20/lib/node_modules/pnpm 2>/dev/null || true
              mkdir -p /home/ec2-user/.local
              npm install -g --prefix /home/ec2-user/.local pnpm@9
            fi
            if [ -f "$APP_DIR/scripts/deploy-ec2.sh" ]; then
              "$APP_DIR/scripts/deploy-ec2.sh" "${{ github.ref_name }}" "staging"
            else
              # First deploy — clean up any partial clone and retry with HTTPS
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
              "$APP_DIR/scripts/deploy-ec2.sh" "${{ github.ref_name }}" "staging"
            fi

      - name: Smoke test Web
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "https://staging.athlete-agent.rosinbum.org/api/health"

      - name: Smoke test Slack
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "https://slack-staging.athlete-agent.rosinbum.org/health"

  deploy-production:
    name: Deploy to Production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run database migrations
        run: |
          DB_URL=$(npx sst secret list --stage production 2>/dev/null | grep '^DatabaseUrl=' | cut -d= -f2-)
          echo "::add-mask::$DB_URL"
          DATABASE_URL="$DB_URL" ./node_modules/.bin/tsx scripts/run-migrations.ts

      # Phase 1: SST deploy (Lambda workers, crons, DynamoDB, SQS, S3, EC2 instance)
      - name: Deploy SST infrastructure
        id: sst
        run: |
          npx sst deploy --stage production 2>&1 | tee deploy-output.txt
          EC2_IP=$(grep -oP 'ec2PublicIp:\s+\K\S+' deploy-output.txt || true)
          echo "ec2_ip=$EC2_IP" >> "$GITHUB_OUTPUT"

      - name: Wait for EC2 SSH to be ready
        run: |
          EC2_IP="${{ steps.sst.outputs.ec2_ip || secrets.EC2_HOST }}"
          echo "Waiting for SSH on $EC2_IP (up to 10 min)..."
          for i in $(seq 1 60); do
            if nc -z -w5 "$EC2_IP" 22 2>/dev/null; then
              echo "SSH is ready (attempt $i)"
              exit 0
            fi
            echo "  ...not ready yet ($((i * 10))s elapsed)"
            sleep 10
          done
          echo "Timed out waiting for EC2 SSH after 10 minutes"
          exit 1

      # Phase 2: Deploy web + Slack to EC2 via SSH
      - name: Deploy apps to EC2
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ steps.sst.outputs.ec2_ip || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            sudo cloud-init status --wait 2>/dev/null || true
            export APP_DIR="/home/ec2-user/app"
            export REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
            export PATH="/home/ec2-user/.local/bin:$PATH"
            if ! command -v pnpm &>/dev/null; then
              echo "pnpm not found — installing to /home/ec2-user/.local"
              sudo rm -rf /usr/lib/nodejs20/lib/node_modules/pnpm 2>/dev/null || true
              mkdir -p /home/ec2-user/.local
              npm install -g --prefix /home/ec2-user/.local pnpm@9
            fi
            if [ -f "$APP_DIR/scripts/deploy-ec2.sh" ]; then
              "$APP_DIR/scripts/deploy-ec2.sh" "${{ inputs.tag }}" "production"
            else
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
              "$APP_DIR/scripts/deploy-ec2.sh" "${{ inputs.tag }}" "production"
            fi

      - name: Smoke test Web
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "https://athlete-agent.rosinbum.org/api/health"

      - name: Smoke test Slack
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "https://slack.athlete-agent.rosinbum.org/health"

  rollback-production:
    name: Rollback Production
    needs: deploy-production
    if: failure()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Find previous production tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ inputs.tag }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — cannot rollback"
            exit 1
          fi
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Rolling back from $CURRENT_TAG to $PREV_TAG"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ steps.prev-tag.outputs.tag }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # Phase 1: Rollback SST infrastructure
      - name: Redeploy previous SST infrastructure
        id: sst
        run: |
          echo "Deploying ${{ steps.prev-tag.outputs.tag }} to production"
          npx sst deploy --stage production 2>&1 | tee deploy-output.txt
          EC2_IP=$(grep -oP 'ec2PublicIp:\s+\K\S+' deploy-output.txt || true)
          echo "ec2_ip=$EC2_IP" >> "$GITHUB_OUTPUT"

      - name: Wait for EC2 SSH to be ready
        run: |
          EC2_IP="${{ steps.sst.outputs.ec2_ip || secrets.EC2_HOST }}"
          echo "Waiting for SSH on $EC2_IP (up to 10 min)..."
          for i in $(seq 1 60); do
            if nc -z -w5 "$EC2_IP" 22 2>/dev/null; then
              echo "SSH is ready (attempt $i)"
              exit 0
            fi
            echo "  ...not ready yet ($((i * 10))s elapsed)"
            sleep 10
          done
          echo "Timed out waiting for EC2 SSH after 10 minutes"
          exit 1

      # Phase 2: Rollback EC2 apps
      - name: Rollback EC2 apps
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ steps.sst.outputs.ec2_ip || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            sudo cloud-init status --wait 2>/dev/null || true
            export APP_DIR="/home/ec2-user/app"
            export REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
            export PATH="/home/ec2-user/.local/bin:$PATH"
            if ! command -v pnpm &>/dev/null; then
              echo "pnpm not found — installing to /home/ec2-user/.local"
              sudo rm -rf /usr/lib/nodejs20/lib/node_modules/pnpm 2>/dev/null || true
              mkdir -p /home/ec2-user/.local
              npm install -g --prefix /home/ec2-user/.local pnpm@9
            fi
            "$APP_DIR/scripts/deploy-ec2.sh" "${{ steps.prev-tag.outputs.tag }}" "production"

      - name: Smoke test Web
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "https://athlete-agent.rosinbum.org/api/health"

      - name: Smoke test Slack
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "https://slack.athlete-agent.rosinbum.org/health"
