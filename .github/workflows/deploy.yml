name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy (e.g. v1.2.3)"
        required: true
      stage:
        description: "Target stage"
        type: choice
        options:
          - production
        default: production

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.stage || 'staging' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # Gate: verify CI passed on the tagged commit before deploying to staging
  ci-check:
    name: Verify CI passed
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check CI status on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit $COMMIT_SHA"

          # Wait up to 10 minutes for CI check runs to complete
          for i in $(seq 1 60); do
            # Get check runs excluding our own deploy checks
            CHECKS_JSON=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/check-runs" \
              --jq '[.check_runs[] | select(.name != "Verify CI passed" and .name != "Deploy to Staging" and .name != "Deploy to Production")]')

            TOTAL=$(echo "$CHECKS_JSON" | jq 'length')
            COMPLETED=$(echo "$CHECKS_JSON" | jq '[.[] | select(.status == "completed")] | length')
            SUCCESSFUL=$(echo "$CHECKS_JSON" | jq '[.[] | select(.conclusion == "success" or .conclusion == "skipped")] | length')
            FAILED=$(echo "$CHECKS_JSON" | jq '[.[] | select(.conclusion == "failure" or .conclusion == "cancelled")] | length')

            echo "Check runs: $COMPLETED/$TOTAL completed ($SUCCESSFUL passed, $FAILED failed). Attempt $i/60"

            if [ "$TOTAL" -gt 0 ] && [ "$COMPLETED" -eq "$TOTAL" ]; then
              if [ "$FAILED" -gt 0 ]; then
                echo "CI checks failed. Aborting deployment."
                echo "$CHECKS_JSON" | jq -r '.[] | select(.conclusion == "failure" or .conclusion == "cancelled") | "  ✗ \(.name): \(.conclusion)"'
                exit 1
              fi
              echo "All CI checks passed."
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for CI checks. Aborting deployment."
          exit 1

  deploy-staging:
    name: Deploy to Staging
    needs: ci-check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run database migrations
        run: npx sst shell --stage staging --print-logs -- ./node_modules/.bin/tsx scripts/run-migrations.ts

      - name: Deploy to staging
        id: deploy
        run: |
          npx sst deploy --stage staging 2>&1 | tee deploy-output.txt
          WEB_URL=$(grep -oP 'webUrl:\s+\K\S+' deploy-output.txt || true)
          if [ -z "$WEB_URL" ]; then
            echo "::warning::Could not extract URLs from SST output. Smoke tests will be skipped."
            echo "SST output:"
            cat deploy-output.txt
          fi
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test Web
        if: steps.deploy.outputs.web_url != ''
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "${{ steps.deploy.outputs.web_url }}/api/health"

  deploy-production:
    name: Deploy to Production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run database migrations
        run: npx sst shell --stage production -- ./node_modules/.bin/tsx scripts/run-migrations.ts

      - name: Deploy to production
        id: deploy
        run: |
          npx sst deploy --stage production 2>&1 | tee deploy-output.txt
          WEB_URL=$(grep -oP 'webUrl:\s+\K\S+' deploy-output.txt || true)
          if [ -z "$WEB_URL" ]; then
            echo "::warning::Could not extract URLs from SST output. Smoke tests will be skipped."
            echo "SST output:"
            cat deploy-output.txt
          fi
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test Web
        if: steps.deploy.outputs.web_url != ''
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "${{ steps.deploy.outputs.web_url }}/api/health"

  rollback-production:
    name: Rollback Production
    needs: deploy-production
    if: failure()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Find previous production tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ inputs.tag }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — cannot rollback"
            exit 1
          fi
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Rolling back from $CURRENT_TAG to $PREV_TAG"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ steps.prev-tag.outputs.tag }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Redeploy previous tag
        id: deploy
        run: |
          echo "Deploying ${{ steps.prev-tag.outputs.tag }} to production"
          npx sst deploy --stage production 2>&1 | tee deploy-output.txt
          WEB_URL=$(grep -oP 'webUrl:\s+\K\S+' deploy-output.txt || true)
          if [ -z "$WEB_URL" ]; then
            echo "::warning::Could not extract URLs from SST output. Smoke tests will be skipped."
            echo "SST output:"
            cat deploy-output.txt
          fi
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test Web
        if: steps.deploy.outputs.web_url != ''
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            "${{ steps.deploy.outputs.web_url }}/api/health"
