name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        # Don't fail the build if the audit endpoint is unavailable
        # (npm retired the legacy audit endpoint, returns 410)
        run: pnpm audit --audit-level=high || true
        continue-on-error: true

      - run: pnpm --filter @usopc/core test -- --coverage
      - run: pnpm --filter @usopc/shared test -- --coverage
      - run: pnpm --filter @usopc/ingestion test -- --coverage
      - run: pnpm --filter @usopc/evals test -- --coverage
      - run: pnpm --filter @usopc/slack test -- --coverage
      - run: pnpm --filter @usopc/web test -- --coverage

      - name: Download coverage baseline
        uses: dawidd6/action-download-artifact@20319c5641d495c8a52e688b7dc5fada6c3a9fbc # v8
        continue-on-error: true
        with:
          workflow: coverage-baseline.yml
          branch: main
          name: coverage-baseline
          path: baseline
          if_no_artifact_found: warn

      - name: Update PR with coverage summary
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const packages = [
              { name: 'core', path: 'packages/core/coverage/coverage-summary.json' },
              { name: 'shared', path: 'packages/shared/coverage/coverage-summary.json' },
              { name: 'ingestion', path: 'packages/ingestion/coverage/coverage-summary.json' },
              { name: 'evals', path: 'packages/evals/coverage/coverage-summary.json' },
              { name: 'slack', path: 'apps/slack/coverage/coverage-summary.json' },
              { name: 'web', path: 'apps/web/coverage/coverage-summary.json' },
            ];

            // Load current coverage
            const current = {};
            for (const pkg of packages) {
              if (fs.existsSync(pkg.path)) {
                const summary = JSON.parse(fs.readFileSync(pkg.path, 'utf8'));
                current[pkg.name] = summary.total.lines.pct;
              }
            }

            // Load baseline (if available)
            let baseline = null;
            const baselinePath = 'baseline/coverage-baseline.json';
            if (fs.existsSync(baselinePath)) {
              baseline = JSON.parse(fs.readFileSync(baselinePath, 'utf8'));
            }

            // Build table rows
            const regressions = [];
            let rows = '';
            for (const name of Object.keys(current)) {
              const pct = current[name];
              let deltaCell = '—';
              if (baseline && baseline[name] != null) {
                const diff = pct - baseline[name].lines;
                const sign = diff >= 0 ? '+' : '';
                const warn = diff < -1 ? ' ⚠️' : '';
                deltaCell = `${sign}${diff.toFixed(1)}%${warn}`;
                if (diff < -1) {
                  regressions.push({ name, from: baseline[name].lines, to: pct, diff });
                }
              }
              rows += `| ${name} | ${pct.toFixed(1)}% | ${deltaCell} |\n`;
            }

            const table = [
              '---',
              '### Test Coverage',
              '',
              '| Package | Coverage | Delta |',
              '|---------|----------|-------|',
              rows.trimEnd(),
            ].join('\n');

            const START = '<!-- coverage-summary-start -->';
            const END = '<!-- coverage-summary-end -->';
            const section = `${START}\n${table}\n${END}`;

            // Update PR description
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            let body = pr.body || '';
            const startIdx = body.indexOf(START);
            const endIdx = body.indexOf(END);
            if (startIdx !== -1 && endIdx !== -1) {
              body = body.slice(0, startIdx) + section + body.slice(endIdx + END.length);
            } else {
              body = body + '\n\n' + section;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body,
            });

            // Post a single comment only if coverage regressed >1%
            if (regressions.length > 0) {
              const lines = regressions.map(
                r => `- **${r.name}**: ${r.from.toFixed(1)}% → ${r.to.toFixed(1)}% (${r.diff.toFixed(1)}%)`
              );
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Coverage regression detected**\n\n${lines.join('\n')}`,
              });
            }

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx prettier --check .
